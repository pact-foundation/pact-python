#:schema https://raw.githubusercontent.com/j178/prek/refs/heads/master/prek.schema.json
#:tombi toml-version = "v1.1.0"

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-case-conflict" },
  { id = "check-executables-have-shebangs" },
  { id = "check-illegal-windows-names" },
  { id = "check-merge-conflict" },
  { id = "check-shebang-scripts-are-executable" },
  { id = "check-symlinks" },
  { id = "check-vcs-permalinks" },
  { id = "destroyed-symlinks" },
  { id = "end-of-file-fixer" },
  { id = "fix-byte-order-marker" },
  { id = "mixed-line-ending" },
  { id = "trailing-whitespace" },
]

# YAML formatting
[[repos]]
repo = "https://github.com/lyz-code/yamlfix/"
rev = "1.19.1"
hooks = [{ id = "yamlfix" }]

[[repos]]
repo = "https://gitlab.com/bmares/check-json5"
rev = "v1.0.1"
hooks = [
  # As above, this only checks for valid JSON files. This implementation
  # allows for comments within JSON files.
  { id = "check-json5" },
]

[[repos]]
repo = "https://github.com/biomejs/pre-commit"
rev = "v2.4.12"
hooks = [{ id = "biome-check" }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.11"

  [[repos.hooks]]
  id = "ruff-check"
  exclude = '(src/pact|tests|examples)/v2/.*\.pyi?'
  args = ["--fix", "--exit-non-zero-on-fix"]

  [[repos.hooks]]
  id = "ruff-format"
  exclude = '(src/pact|tests|examples)/v2/.*\.pyi?'

[[repos]]
repo = "https://github.com/crate-ci/committed"
rev = "v1.1.11"
hooks = [{ id = "committed" }]

[[repos]]
repo = "https://github.com/DavidAnson/markdownlint-cli2"
rev = "v0.22.0"
hooks = [{ id = "markdownlint-cli2" }]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.45.1"

  [[repos.hooks]]
  id = "typos"
  exclude = 'mascot\.svg'

[[repos]]
repo = "https://github.com/tombi-toml/tombi-pre-commit"
rev = "v0.9.20"
hooks = [{ id = "tombi-format" }, { id = "tombi-lint" }]

[[repos]]
repo = "local"

  [[repos.hooks]]
  # Mypy is difficult to run pre-commit's isolated environment as it needs
  # to be able to find dependencies.
  id = "mypy"
  name = "mypy"
  entry = "hatch run mypy"
  language = "system"
  types = ["python"]
  exclude = '(src/pact|tests|examples)/v2/.*\.pyi?'
  stages = ["pre-push"]
